version: '3.8'

services:
  blockchain_confirmationbot:
    image: officiallyrix/blockchain_confirmationbot:latest
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DB_CONNECTION_STRING=mongodb://mongo:27017/confirmationbot

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: